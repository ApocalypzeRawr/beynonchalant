<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - {{ data.nama_lengkap }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0B0E14;
            --text-color: #E4E4E7;
            --nav-bg: rgba(11, 14, 20, 0.8);
            --accent-color: #ffffff;
            --icon-fill: #ffffff;
        }

        [data-theme="light"] {
            --bg-color: #F4F4F5;
            --text-color: #18181B;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --accent-color: #000000;
            --icon-fill: #18181B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            transition: background-color 0.3s, color 0.3s;
            overflow-x: hidden;
        }

        /* Navbar / Toolbar */
        .navbar { 
            display: flex; 
            justify-content: center; 
            padding: 20px 0; 
            position: fixed; 
            width: 100%; 
            top: 0; 
            z-index: 9999; /* Pastikan selalu di depan */
        }

        .nav-container { 
            background: var(--nav-bg); 
            backdrop-filter: blur(15px); 
            padding: 10px 25px; 
            border-radius: 50px; 
            display: flex; 
            gap: 20px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            align-items: center;
        }

        .nav-item { 
            text-decoration: none; 
            color: var(--text-color); 
            font-size: 11px; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        /* Toggle Button Minimalis */
        #theme-toggle {
            background: none;
            border: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            padding: 0;
            color: var(--icon-fill);
        }

        #theme-toggle svg {
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

        /* Hero Content */
        .hero-container { 
            max-width: 1100px; 
            margin: 160px auto 40px; 
            padding: 0 30px; 
            display: grid; 
            grid-template-columns: 1.2fr 1fr; 
            gap: 50px; 
            align-items: center; 
        }

        .main-title { font-size: 56px; font-weight: 800; color: var(--accent-color); line-height: 1.1; }
        .npm-badge { 
            font-size: 14px; 
            margin: 15px 0; 
            background: var(--accent-color); 
            color: var(--bg-color); 
            padding: 6px 15px; 
            border-radius: 8px; 
            display: inline-block; 
            font-weight: 700; 
        }

        .hero-image img { 
            width: 100%; 
            border-radius: 40px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        @media (max-width: 850px) {
            .hero-container { grid-template-columns: 1fr; text-align: center; margin-top: 120px; }
            .hero-image { order: -1; }
            .main-title { font-size: 38px; }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-item">Home</a>
            <button id="theme-toggle" aria-label="Toggle Theme">
                <!-- Ikon Matahari -->
                <svg id="sun-icon" viewBox="0 0 24 24" style="display: none;">
                    <path d="M12 7c-2.76 0-5 2.24-5 5s2.24 5 5 5 5-2.24 5-5-2.24-5-5-5zM2 13h2c.55 0 1-.45 1-1s-.45-1-1-1H2c-.55 0-1 .45-1 1s.45 1 1 1zm18 0h2c.55 0 1-.45 1-1s-.45-1-1-1h-2c-.55 0-1 .45-1 1s.45 1 1 1zM11 2v2c0 .55.45 1 1 1s1-.45 1-1V2c0-.55-.45-1-1-1s-1 .45-1 1zm0 18v2c0 .55.45 1 1 1s1-.45 1-1v-2c0-.55-.45-1-1-1s-1 .45-1 1zM5.99 4.58c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41L5.99 4.58zm12.37 12.37c-.39-.39-1.03-.39-1.41 0s-.39 1.03 0 1.41l1.06 1.06c.39.39 1.03.39 1.41 0s.39-1.03 0-1.41l-1.06-1.06zm1.06-12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41zm-12.37 12.37c-.39-.39-1.03-.39-1.41 0l-1.06 1.06c-.39.39-.39 1.03 0 1.41s1.03.39 1.41 0l1.06-1.06c.39-.38.39-1.02 0-1.41z"/>
                </svg>
                <!-- Ikon Bulan -->
                <svg id="moon-icon" viewBox="0 0 24 24">
                    <path d="M12.12 22a9.91 9.91 0 0 1-7.07-2.93A10 10 0 1 1 12.12 2z"/>
                </svg>
            </button>
        </div>
    </nav>

    <main class="hero-container">
        <div class="hero-text">
            <h1 class="main-title">Hi, I'm {{ data.nama_lengkap }}</h1>
            <div class="npm-badge">NPM: {{ data.npm }}</div>
            <p>{{ data.deskripsi }}</p>
        </div>
        <div class="hero-image">
            <img src="{{ url_for('static', filename='profile.jpg') }}" alt="Profile Photo">
        </div>
    </main>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const sunIcon = document.getElementById('sun-icon');
        const moonIcon = document.getElementById('moon-icon');
        const htmlElement = document.documentElement;

        function updateIcons(theme) {
            if (theme === 'light') {
                sunIcon.style.display = 'none';
                moonIcon.style.display = 'block';
            } else {
                sunIcon.style.display = 'block';
                moonIcon.style.display = 'none';
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        htmlElement.setAttribute('data-theme', savedTheme);
        updateIcons(savedTheme);

        toggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateIcons(newTheme);
        });
    </script>
</body>
</html>
