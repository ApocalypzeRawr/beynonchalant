<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - {{ data.nama_lengkap }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        /* Variabel Warna Tema */
        :root {
            --bg-color: #0B0E14;
            --text-color: #E4E4E7;
            --card-bg: rgba(255, 255, 255, 0.02);
            --nav-bg: rgba(11, 14, 20, 0.8);
            --accent-color: #ffffff;
        }

        [data-theme="light"] {
            --bg-color: #F4F4F5;
            --text-color: #18181B;
            --card-bg: #FFFFFF;
            --nav-bg: rgba(255, 255, 255, 0.8);
            --accent-color: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body { 
            font-family: 'Poppins', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            line-height: 1.6; 
            transition: all 0.3s ease; 
        }

        /* Navbar */
        .navbar { display: flex; justify-content: center; padding: 20px 0; position: fixed; width: 100%; top: 0; z-index: 1000; }
        .nav-container { 
            background: var(--nav-bg); 
            backdrop-filter: blur(15px); 
            padding: 8px 20px; 
            border-radius: 50px; 
            display: flex; 
            gap: 15px; 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            align-items: center;
        }
        .nav-item { text-decoration: none; color: #71717a; font-size: 10px; font-weight: 700; text-transform: uppercase; }
        .nav-item:hover { color: var(--accent-color); }
        
        #theme-toggle { background: none; border: none; cursor: pointer; font-size: 16px; padding: 5px; }

        /* Hero Section */
        .hero-container { max-width: 1100px; margin: 140px auto 40px; padding: 0 30px; display: grid; grid-template-columns: 1.3fr 1fr; gap: 40px; align-items: center; }
        .main-title { font-size: 48px; font-weight: 800; color: var(--accent-color); }
        .sub-title { font-size: 16px; margin-bottom: 20px; background: var(--accent-color); color: var(--bg-color); padding: 5px 12px; border-radius: 6px; display: inline-block; font-weight: 600; }
        .hero-image img { width: 100%; max-width: 350px; border-radius: 30px; border: 1px solid rgba(255, 255, 255, 0.1); }

        @media (max-width: 850px) { .hero-container { grid-template-columns: 1fr; text-align: center; } .hero-image { order: -1; } }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="#" class="nav-item">Home</a>
            <button id="theme-toggle" title="Switch Theme">🌓</button>
        </div>
    </nav>

    <main class="hero-container">
        <div class="hero-text">
            <h1 class="main-title">Hi, I'm {{ data.nama_lengkap }}</h1>
            <div class="sub-title">NPM: {{ data.npm }}</div>
            <p class="description-text">{{ data.deskripsi }}</p>
        </div>
        <div class="hero-image">
            <!-- Lokasi gambar statis -->
            <img src="{{ url_for('static', filename='profile.jpg') }}" alt="Profile Photo">
        </div>
    </main>

    <script>
        const toggleBtn = document.getElementById('theme-toggle');
        const htmlElement = document.documentElement;
        
        // Cek LocalStorage agar tema tidak berubah saat refresh
        const savedTheme = localStorage.getItem('theme') || 'dark';
        htmlElement.setAttribute('data-theme', savedTheme);

        toggleBtn.addEventListener('click', () => {
            const currentTheme = htmlElement.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            htmlElement.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        });
    </script>
</body>
</html>
